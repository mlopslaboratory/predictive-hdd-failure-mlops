name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
      - "feature/**"

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/predictive-hdd-failure-api

jobs:
  lint-test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run ruff
        run: python -m ruff check .

      - name: Run pytest
        run: python -m pytest

  docker-build:
    name: Build Docker image smoke test
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t predictive-hdd-failure-api:${{ github.sha }} .

  deploy:
    name: Publish image and update GitOps
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install DVC
        run: python -m pip install "dvc[s3]"

      - name: Pull model artifacts
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_STORAGE_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_STORAGE_SECRET_ACCESS_KEY }}
        run: |
          dvc pull models/rf_model.pkl models/features.json models/preprocessing.json
          test -f models/rf_model.pkl
          test -f models/features.json
          test -f models/preprocessing.json

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build \
            -t "${IMAGE_NAME}:${GITHUB_SHA}" \
            -t "${IMAGE_NAME}:latest" \
            .
          docker push "${IMAGE_NAME}:${GITHUB_SHA}"
          docker push "${IMAGE_NAME}:latest"

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: mlopslaboratory/predictive-hdd-failure-gitops
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops

      - name: Update GitOps image tag
        working-directory: gitops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          kustomization="apps/predictive-hdd-failure/overlays/minikube/kustomization.yaml"
          sed -i "s|newName: .*|newName: ${IMAGE_NAME}|" "${kustomization}"
          sed -i "s|newTag: .*|newTag: ${GITHUB_SHA}|" "${kustomization}"

          git add "${kustomization}"
          if git diff --cached --quiet; then
            echo "GitOps image tag is already up to date."
          else
            git commit -m "Update predictive HDD API image to ${GITHUB_SHA::7}"
            git push
          fi
