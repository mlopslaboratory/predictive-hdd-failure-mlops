name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
      - "feature/**"

jobs:
  lint-test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run ruff
        run: python -m ruff check .

      - name: Run pytest
        run: python -m pytest

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t predictive-hdd-failure-mlops:${{ github.sha }} .

  deploy:
    name: Deploy gate
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    steps:
      - name: Deployment placeholder
        run: |
          echo "Deploy step is reserved for Kubernetes/Minikube manifests."
          echo "The concrete deployment will be enabled after k8s manifests are added."
