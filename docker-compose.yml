services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: predictive-hdd-failure-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PROMETHEUS_URL=http://localhost:9090
      - GRAFANA_URL=http://localhost:3000
    volumes:
      - ./mlruns:/app/mlruns
      # If a local logs folder is used, uncomment the next line:
      # - ./logs:/app/logs

  prometheus:
    build:
      context: ./monitoring/prometheus
    image: predictive-hdd-failure-prometheus:local
    container_name: predictive-hdd-failure-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    depends_on:
      - app

  grafana:
    image: grafana/grafana:11.4.0
    container_name: predictive-hdd-failure-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
