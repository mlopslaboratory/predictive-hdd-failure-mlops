training:
  train_path: data/raw/train.parquet
  test_path: data/raw/test.parquet
  target_column: label
  drop_columns:
    - date

mlflow:
  tracking_uri: mlflow.db
  experiment_name: hdd_failure

model:
  name: RandomForest
  params:
    n_estimators: 200
    max_depth: 10
    min_samples_leaf: 10
    class_weight: balanced
    random_state: 42
    n_jobs: -1
